name: 📊 Metrics
on:
  # Schedule updates (every 6 hours)
  schedule: [{ cron: "0 */6 * * *" }]
  # Lets you run workflow manually and on each commit to main/master
  workflow_dispatch:
  push: { branches: ["master", "main"] }

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      # ───────────────────────────────────────────────
      # 🎯 Main metrics card (header + activity + community)
      # ───────────────────────────────────────────────
      - name: 📈 Main metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: tellmeY18
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large
          config_animations: yes
          config_padding: 0, 8 + 11%

          # 🔥 Habits
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 500
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes

          # 📅 Isometric calendar (full year heatmap)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 💻 Lines of code changed
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_sections: base

          # ⭐ Notable contributions
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request, issue

          # 📂 Projects
          plugin_projects: yes
          plugin_projects_descriptions: yes
          plugin_projects_limit: 4

          # ❤️ Reactions
          plugin_reactions: yes
          plugin_reactions_details: percentage
          plugin_reactions_limit: 200

          # 🏆 Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact

          # 🗣️ Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, tex, less, dockerfile, makefile, qmake, lex, cmake, gnuplot, roff
          plugin_languages_details: percentage, bytes-size, lines
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_colors: github

          # 🏷️ Topics I like
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15

          # 👥 Followup (PRs / issues merged / closed)
          plugin_followup: yes
          plugin_followup_sections: repositories

          # 🌟 Stargazers trend
          plugin_stargazers: yes
          plugin_stargazers_charts_type: graph
          plugin_stargazers_worldmap: no

          # 📝 Recent activity
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 5
          plugin_activity_load: 200
          plugin_activity_filter: issue, pr, release, fork, review, star

      # ───────────────────────────────────────────────
      # 🧑‍💻 Terminal-style introduction card
      # ───────────────────────────────────────────────
      - name: 🖥️ Terminal card
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.terminal.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: tellmeY18
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata
          plugin_introduction: yes

      # ───────────────────────────────────────────────
      # 🧩 Isometric full-year calendar card
      # ───────────────────────────────────────────────
      - name: 📅 Isocalendar card
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: tellmeY18
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ───────────────────────────────────────────────
      # 🏆 Achievements card
      # ───────────────────────────────────────────────
      - name: 🏆 Achievements card
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: tellmeY18
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

      # ───────────────────────────────────────────────
      # 🗣️ Languages (in-depth) card
      # ───────────────────────────────────────────────
      - name: 🗣️ Languages card
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: tellmeY18
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, tex, less, dockerfile, makefile, qmake, lex, cmake, gnuplot, roff
          plugin_languages_details: percentage, bytes-size, lines
          plugin_languages_limit: 10
          plugin_languages_analysis_timeout: 15
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_colors: github
