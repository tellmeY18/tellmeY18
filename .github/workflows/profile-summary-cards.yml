name: 🎴 GitHub Profile Summary Cards

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: 🎴 Generate profile summary cards
    steps:
      # ───────────────────────────────────────────────
      # 📥 Checkout the repo
      # ───────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v5

      # ───────────────────────────────────────────────
      # 🎴 Generate Vercel-style profile summary cards
      #    (stats, top-langs, repos-per-language,
      #     most-commit-language, productive-time, profile-details)
      # ───────────────────────────────────────────────
      - name: 🎴 Build profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 5
